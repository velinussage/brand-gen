name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Compile check
        run: |
          python -m py_compile mcp/brand_iterate.py
          python -m py_compile mcp/brand_iterate_mcp.py
          python -m py_compile mcp/pipeline_runner.py
          python -m py_compile mcp/pipeline_types.py
          python -m py_compile mcp/route_predicates.py
          python -m py_compile mcp/generate.py

      - name: Run tests
        run: python -m pytest tests/ -v
