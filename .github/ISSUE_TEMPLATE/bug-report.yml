name: Bug Report
description: Report a bug in brand-gen
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: CLI commands or MCP tool calls that trigger the bug.
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12"
  - type: dropdown
    id: interface
    attributes:
      label: Interface
      options:
        - CLI
        - MCP server
        - Both
